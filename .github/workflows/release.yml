name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to upload assets to
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Prepare artifact metadata
        id: meta
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.release_tag }}" } elseif ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { 'dev' }
          $binary = "ruijie-go-$tag-windows-amd64.exe"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "binary=$binary" >> $env:GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.meta.outputs.tag }}" -o "${{ steps.meta.outputs.binary }}" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.binary }}
          path: ${{ steps.meta.outputs.binary }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: ${{ steps.meta.outputs.binary }}
