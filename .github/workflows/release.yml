name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Prepare artifact metadata
        id: meta
        run: |
          $tag = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { 'dev' }
          $binary = "runjie-go-$tag-windows-amd64.exe"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "binary=$binary" >> $env:GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.meta.outputs.tag }}" -o "${{ steps.meta.outputs.binary }}" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.binary }}
          path: ${{ steps.meta.outputs.binary }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.binary }}
